name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest  # Changed to windows-latest to match your new config

    steps:
      # ── Step 1: Get the code ──────────────────
      - name: Get the code
        uses: actions/checkout@v4  # Updated to v4
        with:
          fetch-depth: 0  # Shallow clones disabled for better analysis relevancy

      # ── Step 2: Install Python ────────────────
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13.13'

      # ── Step 3: Install dependencies ─────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Run tests ─────────────────────
      - name: Run tests
        run: pytest tests/ --tb=short

      # ── Step 5: SonarQube scan ────────────────
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6  # Updated to v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      
      # Optional: Quality Gate check (uncomment to fail job on red quality gate)
      # - name: SonarQube Quality Gate
      #   uses: SonarSource/sonarqube-quality-gate-action@v1
